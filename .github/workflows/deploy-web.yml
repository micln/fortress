name: deploy-web

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Godot 4.6.1
        uses: chickensoft-games/setup-godot@v2.3.0
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Import project assets
        run: godot --headless --path . --import

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/index.html

      - name: Add GitHub Pages SPA fallback
        run: cp build/web/index.html build/web/404.html

      - name: Verify exported web files
        run: |
          test -f build/web/index.html
          test -f build/web/index.js
          test -f build/web/index.wasm
          test -f build/web/index.pck
          test -f build/web/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
